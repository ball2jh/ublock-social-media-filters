name: Test Filters

on:
  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'
  push:
    paths:
      - 'ublock-social-media-filters.txt'
      - 'test-filters.js'
      - '.github/workflows/test-filters.yml'
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Firefox
        run: npx playwright install firefox --with-deps

      - name: Download uBlock Origin XPI
        run: |
          curl -sL "https://addons.mozilla.org/firefox/downloads/latest/ublock-origin/addon-607454-latest.xpi" \
            -o ublock-origin.xpi

      - name: Run syntax validation
        run: node validate-filters.js

      - name: Run E2E tests against live sites
        run: node test-filters.js

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Filter tests failing — DOM selectors may be broken`;
            const body = [
              `The weekly filter validation run failed.`,
              ``,
              `This usually means YouTube or Reddit changed their DOM structure `,
              `and one or more cosmetic filter selectors no longer match.`,
              ``,
              `**Action needed:** Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) `,
              `for details on which selectors broke, then update the filter list.`,
              ``,
              `_Auto-generated by the test-filters workflow._`,
            ].join('\n');

            // Don't create duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'filter-breakage',
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['filter-breakage'],
              });
            }
